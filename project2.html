<html>

<head>
    <title>Project 2 - Color Counter</title>

    <script>
        var red = 0;
        var blue = 0;
        var black = 0;

        function display() {
            var newTab = window.open();

            for (var i = 1; i <= red; i++) {
                newTab.document.write("<p style='color: red'>Pressed Red Button: " + i + "</p>")
            }

            for (var i = 1; i <= blue; i++) {
                newTab.document.write("<p style='color: blue'>Pressed Blue Button: " + i + "</p>")
            }

            for (var i = 1; i <= black; i++) {
                newTab.document.write("<p style='color: black'>Pressed Black Button: " + i + "</p>")
            }
        }
    </script>
</head>

<body>
    <form>
        <h3>Click on the buttons</h3>

        <p><input type="button" value="Red" onClick="red++;" /></p>
        <p><input type="button" value="Blue" onClick="blue++;" /></p>
        <p><input type="button" value="Black" onClick="black++;" /></p>

        <p><input type="button" value="Show Counts" onClick="display()" /></p>
    </form>
</body>

</html>
